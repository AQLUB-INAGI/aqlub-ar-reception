<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  >
  <title>アクラブ受付AR</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    #guide {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      z-index: 1000;
      padding: 10px 16px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.65);
      color: white;
      font-family: sans-serif;
      font-size: 16px;
      text-align: center;
      white-space: nowrap;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div id="guide">受付のマークにカメラを向けてください</div>

  <a-scene
    id="ar-scene"
    mindar-image="
      imageTargetSrc: ./targets.mind;
      autoStart: true;
      filterMinCF: 0.001;
      filterBeta: 0.01;
      warmupTolerance: 5;
      missTolerance: 10;
    "
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <img id="welcome-character" src="./images/welcome.png">
    </a-assets>

    <a-camera
      position="0 0 0"
      look-controls="enabled: false"
    ></a-camera>

    <a-entity
      id="reception-target"
      mindar-image-target="targetIndex: 0"
    >
      <a-image
        src="#welcome-character"
        position="-1.35 0.10 0.02"
        width="1.35"
        height="1.35"
        material="shader: flat; transparent: true; alphaTest: 0.05; side: double"
      ></a-image>
    </a-entity>
  </a-scene>

  <script>
    const scene = document.querySelector("#ar-scene");
    const target = document.querySelector("#reception-target");
    const guide = document.querySelector("#guide");

    scene.addEventListener("arReady", () => {
      guide.textContent = "受付のマークを探してください";
      setTimeout(() => window.dispatchEvent(new Event("resize")), 300);
      setTimeout(() => window.dispatchEvent(new Event("resize")), 1000);
    });

    scene.addEventListener("arError", () => {
      guide.textContent =
        "カメラを開始できません。ブラウザのカメラ許可を確認してください";
    });

    target.addEventListener("targetFound", () => {
      guide.style.display = "none";
    });

    target.addEventListener("targetLost", () => {
      guide.style.display = "block";
      guide.textContent = "もう一度、受付のマークを映してください";
    });

    window.addEventListener("orientationchange", () => {
      setTimeout(() => window.dispatchEvent(new Event("resize")), 300);
    });
  </script>
</body>
</html>
