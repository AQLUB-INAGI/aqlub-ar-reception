<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0,
    maximum-scale=1.0, user-scalable=no"
  >

  <title>アクラブ受付AR</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    #guide {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      z-index: 1000;
      padding: 10px 16px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.65);
      color: white;
      font-family: sans-serif;
      font-size: 16px;
      text-align: center;
      white-space: nowrap;
    }
  </style>
</head>

<body>

  <div id="guide">
    壁のマークにカメラを向けてください
  </div>

  <a-scene
    mindar-image="
      imageTargetSrc: ./targets.mind;
      autoStart: true;
      filterMinCF: 0.001;
      filterBeta: 0.01;
      warmupTolerance: 5;
      missTolerance: 10;
    "
    embedded
    color-space="sRGB"
    renderer="
      colorManagement: true;
      physicallyCorrectLights: true;
      antialias: true;
      alpha: true;
    "
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >

    <a-assets>
      <img
        id="welcome-character"
        src="./images/welcome.png"
        alt=""
      >
    </a-assets>

    <a-camera
      position="0 0 0"
      look-controls="enabled: false"
    ></a-camera>

    <a-entity
      id="reception-target"
      mindar-image-target="targetIndex: 0"
    >

      <a-image
        src="#welcome-character"
        position="-1.05 -0.75 0"
        width="1.1"
        height="1.1"
        transparent="true"
        material="
          shader: flat;
          transparent: true;
          alphaTest: 0.05;
          side: double;
        "
      ></a-image>

    </a-entity>

  </a-scene>

  <script>
    const scene = document.querySelector("a-scene");
    const target = document.querySelector("#reception-target");
    const guide = document.querySelector("#guide");

    scene.addEventListener("arReady", () => {
      guide.textContent = "受付のマークを探してください";
    });

    scene.addEventListener("arError", () => {
      guide.textContent =
        "カメラを開始できません。ブラウザのカメラ許可を確認してください";
    });

    target.addEventListener("targetFound", () => {
      guide.style.display = "none";
    });

    target.addEventListener("targetLost", () => {
      guide.style.display = "block";
      guide.textContent = "もう一度マークにカメラを向けてください";
    });
  </script>

</body>
</html>
